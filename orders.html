<!doctype html>
<!-- ============================================================
     KSK ERP 1.0 — Module 2: ORDERS (Pending Order Register)
     Tabs: Pending · Register · New PO (Admin+) · Value (Admin+)
     Deploys on: GitHub Pages beside index.html. Upload whole, never edit.
     Rates are NOT in this file's reach for Staff — the money view is
     self-gated inside Postgres. This screen only asks; the DB decides.
     ============================================================ -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orders · KSK ERP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --navy:#0f2440; --navy2:#16345c; --gold:#c9a227; --bg:#f4f6f9; --ok:#1e7e34; --bad:#b02a37; --warn:#a96b00; }
  * { box-sizing:border-box; margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  body { background:var(--bg); min-height:100vh; padding-bottom:70px; }
  header { background:var(--navy); color:#fff; padding:12px 14px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:5; }
  header a { color:var(--gold); text-decoration:none; font-size:20px; }
  header h1 { font-size:16px; flex:1; } header h1 small { display:block; font-weight:400; opacity:.7; font-size:11px; }
  .chip { background:var(--navy2); border:1px solid rgba(255,255,255,.25); border-radius:999px; padding:3px 9px; font-size:11.5px; }
  nav { display:flex; overflow-x:auto; background:#fff; border-bottom:1px solid #e2e7ee; position:sticky; top:53px; z-index:4; }
  nav button { flex:1; min-width:86px; padding:11px 6px; border:0; background:none; font-size:12.5px; font-weight:600; color:#667; border-bottom:3px solid transparent; cursor:pointer; }
  nav button.on { color:var(--navy); border-color:var(--gold); }
  main { max-width:560px; margin:0 auto; padding:12px; }
  .card { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(15,36,64,.08); padding:14px; margin-bottom:10px; }
  .card.clickable { cursor:pointer; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .grow { flex:1; min-width:0; }
  .t-title { font-size:14.5px; font-weight:600; color:#182b45; }
  .t-sub { font-size:12px; color:#778; margin-top:2px; line-height:1.45; }
  .tag { font-size:10.5px; font-weight:700; border-radius:6px; padding:3px 7px; white-space:nowrap; }
  .tag.late { background:#fdeaea; color:var(--bad); } .tag.ok { background:#e6f4ea; color:var(--ok); }
  .tag.soon { background:#fff3d6; color:var(--warn); } .tag.info { background:#e2ecff; color:#1c4fa0; }
  .tag.GOVT { background:#e2ecff; color:#1c4fa0; } .tag.PVT { background:#efe7f7; color:#5b3a86; }
  button.a { border:0; border-radius:8px; padding:8px 11px; font-size:12.5px; font-weight:600; cursor:pointer; background:#e8ecf2; color:var(--navy); }
  button.a.gold { background:var(--gold); color:var(--navy); } button.a.dark { background:var(--navy); color:#fff; }
  input, select, textarea { width:100%; padding:11px; border:1px solid #cfd6e0; border-radius:9px; font-size:14px; margin-top:6px; background:#fff; }
  label { font-size:11.5px; color:#556; display:block; margin-top:8px; }
  h2 { font-size:13.5px; color:var(--navy); margin:14px 2px 8px; }
  .muted { color:#778; font-size:12.5px; }
  .kpi { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; }
  .kpi div { background:#fff; border-radius:10px; padding:10px; text-align:center; box-shadow:0 1px 3px rgba(15,36,64,.07); }
  .kpi b { font-size:20px; color:var(--navy); display:block; } .kpi span { font-size:10.5px; color:#788; }
  .kpi .alert b { color:var(--bad); }
  .bar { height:6px; background:#eef1f5; border-radius:99px; overflow:hidden; margin-top:7px; }
  .bar i { display:block; height:100%; background:var(--ok); }
  table { width:100%; border-collapse:collapse; font-size:12.5px; }
  th { text-align:left; color:#788; font-size:10.5px; padding:6px 4px; border-bottom:1px solid #eef; }
  td { padding:8px 4px; border-bottom:1px solid #f2f4f8; }
  td.n, th.n { text-align:right; }
  #toast { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; padding:10px 18px; border-radius:999px; font-size:13px; display:none; z-index:20; }
  dialog { border:0; border-radius:14px; padding:18px; width:min(94vw,480px); max-height:88vh; }
  dialog::backdrop { background:rgba(15,36,64,.5); }
</style>
</head>
<body>
<header>
  <a href="./index.html">←</a>
  <h1>Orders <small>Pending Order Register · KSK ERP 1.0</small></h1>
  <div class="chip" id="who"></div>
</header>
<nav id="nav"></nav>
<main id="main"><p class="muted" style="padding:30px;text-align:center">Loading…</p></main>
<div id="toast"></div>
<dialog id="dlg"></dialog>

<script>
const sb = supabase.createClient("https://xpacvqbmpvcwhcimieaq.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwYWN2cWJtcHZjd2hjaW1pZWFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NTczNzEsImV4cCI6MjA5OTMzMzM3MX0.88Q1E70WK8kO6osdre4a9yHmTPdAuRYau_ihxD5fl0c"); // public by design; RLS is the guard
const $ = s => document.querySelector(s);
let ME = null, TAB = 'pending';
const esc = t => (t??'').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt = d => d ? new Date(d+'T00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'}) : '—';
const today = () => new Date().toISOString().slice(0,10);
const num = n => (n==null||n==='') ? '—' : Number(n).toLocaleString('en-IN');
const money = n => (n==null) ? '—' : '₹' + Number(n).toLocaleString('en-IN',{maximumFractionDigits:0});
const days = d => d ? Math.round((new Date(d+'T00:00') - new Date(today()+'T00:00'))/864e5) : null;
function toast(m){ const t=$('#toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
async function rpc(fn, args){ const {data,error} = await sb.rpc(fn,args); if(error){ toast(error.message); throw error; } return data; }
async function q(view, mod){ let x = sb.from(view).select('*'); if(mod) x = mod(x); const {data,error} = await x; if(error){ toast(error.message); return []; } return data; }
const isAdmin = () => ME.role==='ADMIN' || ME.role==='DIRECTOR';

const TABS = [['pending','Pending'],['reg','Register'],['new','New PO'],['value','Value']];
function drawNav(){
  const t = isAdmin() ? TABS : TABS.filter(x=>!['new','value'].includes(x[0]));
  $('#nav').innerHTML = t.map(([id,l])=>`<button class="${TAB===id?'on':''}" onclick="go('${id}')">${l}</button>`).join('');
}
function go(t){ TAB=t; drawNav(); render[t](); }

// ---- cards ----
function dpTag(dp, complete){
  if(complete) return '<span class="tag ok">COMPLETE</span>';
  const d = days(dp);
  if(d===null) return '<span class="tag info">NO DP</span>';
  if(d < 0) return `<span class="tag late">OVERDUE ${-d}d</span>`;
  if(d <= 30) return `<span class="tag soon">DUE ${d}d</span>`;
  return `<span class="tag ok">${d}d left</span>`;
}
function poCard(p){
  const worst = p.overdue_lines>0;
  return `<div class="card clickable" onclick="openPO('${p.id}')"><div class="row">
    <div class="grow">
      <div class="t-title">${esc(p.customer)}</div>
      <div class="t-sub">${p.po_no} · ext ${esc(p.external_po_no||'—')}${p.zone?' · '+esc(p.zone):''}
        <br>${esc(p.consignee||'consignee not set')} · DP ${fmt(p.dp_current)}
        ${p.inspection_agency?'<br>Inspection: '+esc(p.inspection_agency):''}</div>
    </div>
    <div style="text-align:right">
      <span class="tag ${p.po_type}">${p.po_type}</span><br>
      <span style="font-size:11px;color:#889">${p.pending_lines}/${p.line_count} lines open</span>
    </div></div>
    <div class="row" style="margin-top:8px">
      ${worst?`<span class="tag late">${p.overdue_lines} line${p.overdue_lines>1?'s':''} past DP</span>`:dpTag(p.dp_current, p.pending_lines==0)}
      ${p.status!=='OPEN'?`<span class="tag info">${p.status}</span>`:''}
    </div></div>`;
}
function lineRow(l, admin){
  const pct = l.qty_ordered>0 ? Math.min(100, Math.round(100*l.qty_dispatched/l.qty_ordered)) : 0;
  return `<div class="card" style="box-shadow:none;border:1px solid #eef1f5;margin-bottom:8px">
    <div class="row"><div class="grow">
      <div class="t-title">${esc(l.item)}</div>
      <div class="t-sub">${esc(l.drawing_no||'no drawing')} · ${num(l.qty_dispatched)} / ${num(l.qty_ordered)} ${esc(l.uom||'')}
        · bal <b>${num(l.balance)}</b><br>DP ${fmt(l.dp_current)}${l.dp_current!==l.dp_original?` <span class="muted">(orig ${fmt(l.dp_original)})</span>`:''}
        · invoice: ${esc(l.invoice_status||'PENDING')}</div>
    </div>${dpTag(l.dp_current, l.complete)}</div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    ${admin?`<div class="row" style="margin-top:9px">
      <button class="a gold" onclick="addDispatch('${l.id}', ${l.balance})">+ Dispatch</button>
      <button class="a" onclick="extendDP(null,'${l.id}','${esc(l.item)}')">⟳ DP extension</button>
      <button class="a" onclick="invoiceSet('${l.id}')">Invoice…</button>
    </div>`:''}</div>`;
}

// ---- tabs ----
const render = {
  async pending(){
    const [pos, lines] = await Promise.all([
      q('v_pos', x=>x.eq('status','OPEN')),
      q('v_po_lines', x=>x.eq('complete', false))
    ]);
    const byPo = Object.fromEntries(pos.map(p=>[p.id,p]));
    const od = lines.filter(l=>l.dp_current && l.dp_current < today());
    const soon = lines.filter(l=>{ const d=days(l.dp_current); return d!==null && d>=0 && d<=30; });
    const noDP = lines.filter(l=>!l.dp_current);
    const grp = ls => { const m={}; ls.forEach(l=>{ (m[l.po_id] ||= []).push(l); }); return m; };
    const block = (ls, empty) => {
      const g = grp(ls); const keys = Object.keys(g);
      if(!keys.length) return `<p class="muted" style="margin:0 4px 10px">${empty}</p>`;
      return keys.sort((a,b)=>{
        const da = Math.min(...g[a].map(l=>days(l.dp_current) ?? 9e9));
        const db = Math.min(...g[b].map(l=>days(l.dp_current) ?? 9e9));
        return da-db;
      }).map(id=>{
        const p = byPo[id]; if(!p) return '';
        return `<div class="card clickable" onclick="openPO('${id}')">
          <div class="row"><div class="grow"><div class="t-title">${esc(p.customer)}</div>
          <div class="t-sub">${p.po_no}${p.zone?' · '+esc(p.zone):''} · ${esc(p.consignee||'—')}</div></div>
          <span class="tag ${p.po_type}">${p.po_type}</span></div>
          ${g[id].sort((a,b)=>(a.dp_current||'9')<(b.dp_current||'9')?-1:1).map(l=>`<div class="row" style="margin-top:8px">
            <div class="grow"><div class="t-sub" style="color:#233;font-size:13px">${esc(l.item)} <span class="muted">${esc(l.drawing_no||'')}</span></div>
            <div class="t-sub">bal <b>${num(l.balance)}</b> ${esc(l.uom||'')} of ${num(l.qty_ordered)} · DP ${fmt(l.dp_current)}</div></div>
            ${dpTag(l.dp_current, false)}</div>`).join('')}
        </div>`;
      }).join('');
    };
    $('#main').innerHTML = `<div class="kpi">
        <div class="${od.length?'alert':''}"><b>${od.length}</b><span>lines past DP</span></div>
        <div><b>${soon.length}</b><span>due ≤30 days</span></div>
        <div><b>${lines.length}</b><span>lines open</span></div>
        ${noDP.length?`<div class="${noDP.length?'alert':''}"><b>${noDP.length}</b><span>no DP set</span></div>`:''}
      </div>
      <h2>Past DP — LD risk, act first</h2>${block(od,'Nothing overdue. ✓')}
      <h2>Closing in — next 30 days</h2>${block(soon,'Nothing due this month.')}
      ${noDP.length?`<h2>No DP recorded</h2>${block(noDP,'')}`:''}`;
  },
  async reg(){
    const pos = await q('v_pos', x=>x.order('created_at',{ascending:false}));
    const g = pos.filter(p=>p.po_type==='GOVT'), pv = pos.filter(p=>p.po_type==='PVT');
    $('#main').innerHTML =
      `<h2>Government (${g.length})</h2>` + (g.map(poCard).join('') || '<p class="muted">None yet.</p>') +
      `<h2>Private (${pv.length})</h2>` + (pv.map(poCard).join('') || '<p class="muted">None yet.</p>');
  },
  async new(){
    $('#main').innerHTML = `<div class="card">
      <div class="t-title">New purchase order</div>
      <p class="muted" style="margin-top:3px">The internal serial (PO/KSK/26-27/####) is issued by the database. Add the lines after saving.</p>
      <div class="row"><div class="grow"><label>Type</label>
        <select id="p-type" onchange="document.getElementById('zone-wrap').style.display=this.value==='GOVT'?'block':'none'">
          <option value="GOVT">Government</option><option value="PVT">Private</option></select></div>
        <div class="grow" id="zone-wrap"><label>Railway zone (required for Govt)</label><input id="p-zone" placeholder="e.g. SECR"></div></div>
      <label>Customer</label><input id="p-cust" placeholder="e.g. PCMM Bilaspur / Larsen &amp; Toubro">
      <div class="row"><div class="grow"><label>Their PO no.</label><input id="p-ext" placeholder="e.g. 06260094201153"></div>
        <div class="grow"><label>Their PO date</label><input id="p-extd" type="date"></div></div>
      <label>Consignee</label><input id="p-cons" placeholder="Where it ships">
      <div class="row"><div class="grow"><label>Inspection agency</label><input id="p-insp" placeholder="RITES / Intertek / BV"></div>
        <div class="grow"><label>DP (delivery period)</label><input id="p-dp" type="date"></div></div>
      <label>Remarks</label><textarea id="p-rem" rows="2" placeholder="Optional"></textarea>
      <button class="a dark" style="width:100%;margin-top:12px" onclick="createPO()">Create PO</button>
    </div>`;
  },
  async value(){
    const [pos, lines, mon] = await Promise.all([ q('v_pos'), q('v_po_lines'), q('v_po_money') ]);
    if(!mon.length){ $('#main').innerHTML = '<p class="muted" style="padding:20px;text-align:center">No rates recorded yet.</p>'; return; }
    const byPo = Object.fromEntries(pos.map(p=>[p.id,p]));
    const byLine = Object.fromEntries(lines.map(l=>[l.id,l]));
    const agg = {};
    mon.forEach(m=>{
      const l = byLine[m.line_id]; if(!l) return;
      const a = (agg[m.po_id] ||= {value:0, pending:0});
      a.value += Number(m.line_value||0);
      a.pending += Number(m.rate||0) * Number(l.balance||0);
    });
    const rows = Object.entries(agg).map(([id,a])=>({p:byPo[id], ...a})).filter(r=>r.p)
      .sort((x,y)=>y.pending-x.pending);
    const tot = rows.reduce((s,r)=>s+r.value,0), pend = rows.reduce((s,r)=>s+r.pending,0);
    $('#main').innerHTML = `<div class="kpi">
        <div><b style="font-size:15px">${money(tot)}</b><span>order book</span></div>
        <div class="alert"><b style="font-size:15px">${money(pend)}</b><span>yet to dispatch</span></div>
        <div><b style="font-size:15px">${money(tot-pend)}</b><span>dispatched</span></div>
      </div>
      <div class="card"><div class="t-title">Value by PO</div>
      <p class="muted" style="margin:3px 0 8px">Visible to Director &amp; Admin only — enforced in the database, not here.</p>
      <table><tr><th>PO</th><th class="n">Order</th><th class="n">Pending</th></tr>
      ${rows.map(r=>`<tr><td>${esc(r.p.customer)}<br><span class="muted">${r.p.po_no}</span></td>
        <td class="n">${money(r.value)}</td><td class="n"><b>${money(r.pending)}</b></td></tr>`).join('')}
      </table></div>`;
  }
};

// ---- PO detail ----
async function openPO(id){
  const [pos, lines, disp, ext] = await Promise.all([
    q('v_pos', x=>x.eq('id',id)),
    q('v_po_lines', x=>x.eq('po_id',id)),
    q('v_dispatches', x=>x.order('dispatch_date',{ascending:false})),
    q('v_dp_extensions', x=>x.eq('po_id',id).order('granted_on',{ascending:false}))
  ]);
  const p = pos[0]; if(!p) return toast('Not found');
  const admin = isAdmin();
  const lineIds = new Set(lines.map(l=>l.id));
  const ds = disp.filter(d=>lineIds.has(d.line_id));
  const nameOf = lid => (lines.find(l=>l.id===lid)||{}).item || '';
  $('#dlg').innerHTML = `
    <div class="row"><div class="grow"><div class="t-title">${esc(p.customer)}</div>
      <div class="t-sub">${p.po_no} · their no. ${esc(p.external_po_no||'—')} of ${fmt(p.external_po_date)}
        ${p.zone?'<br>Zone: '+esc(p.zone):''}<br>Consignee: ${esc(p.consignee||'—')}
        <br>Inspection: ${esc(p.inspection_agency||'—')} · PO-level DP: ${fmt(p.dp_current)}
        ${p.remarks?'<br>'+esc(p.remarks):''}</div></div>
      <span class="tag ${p.po_type}">${p.po_type}</span></div>
    ${admin?`<div class="row" style="margin-top:10px">
      <button class="a" onclick="addLine('${p.id}')">+ Line</button>
      <button class="a" onclick="extendDP('${p.id}',null,'whole PO')">⟳ DP extension (whole PO)</button>
      ${p.status==='OPEN'?`<button class="a" onclick="closePO('${p.id}')">Close PO</button>`:''}
    </div>`:''}
    <h2>Lines (${lines.length})</h2>
    ${lines.map(l=>lineRow(l, admin)).join('') || '<p class="muted">No lines yet.</p>'}
    ${ext.length?`<h2>DP extensions</h2><table><tr><th>Applied</th><th>Granted</th><th>Revised DP</th><th>Scope</th></tr>
      ${ext.map(e=>`<tr><td>${fmt(e.applied_on)}</td><td>${e.granted_on?fmt(e.granted_on):'<span class="tag soon">pending</span>'}</td>
        <td>${fmt(e.revised_dp)}</td><td>${e.line_id?esc(nameOf(e.line_id)):'whole PO'}</td></tr>`).join('')}</table>`:''}
    ${ds.length?`<h2>Dispatches (${ds.length})</h2><table><tr><th>Date</th><th>Item</th><th class="n">Qty</th><th>Ref</th></tr>
      ${ds.map(d=>`<tr><td>${fmt(d.dispatch_date)}</td><td>${esc(nameOf(d.line_id))}</td><td class="n">${num(d.qty)}</td><td>${esc(d.ref||'—')}</td></tr>`).join('')}</table>`:''}
    <button class="a" style="width:100%;margin-top:14px" onclick="dlg.close()">Close</button>`;
  $('#dlg').showModal();
}

// ---- actions (every write goes through a guarded RPC) ----
async function createPO(){
  const type = $('#p-type').value, cust = $('#p-cust').value.trim();
  if(!cust) return toast('Customer required');
  if(type==='GOVT' && !$('#p-zone').value.trim()) return toast('Railway zone required for a Govt PO');
  const no = await rpc('po_create', { p_type:type, p_customer:cust,
    p_ext_no:$('#p-ext').value||null, p_ext_date:$('#p-extd').value||null,
    p_zone:type==='GOVT'?$('#p-zone').value:null, p_consignee:$('#p-cons').value||null,
    p_inspection:$('#p-insp').value||null, p_dp:$('#p-dp').value||null,
    p_remarks:$('#p-rem').value||null });
  toast('Created '+no); go('reg');
}
function addLine(poId){
  $('#dlg').innerHTML = `<div class="t-title">Add line</div>
    <label>Item</label><input id="l-item" placeholder="e.g. Fish Plate T-5916 with fittings">
    <div class="row"><div class="grow"><label>Drawing no.</label><input id="l-drw" placeholder="T-5916"></div>
      <div class="grow"><label>UOM</label><input id="l-uom" placeholder="Sets / Nos / MT"></div></div>
    <div class="row"><div class="grow"><label>Qty ordered</label><input id="l-qty" type="number" step="0.01"></div>
      <div class="grow"><label>Rate (₹) — optional</label><input id="l-rate" type="number" step="0.01"></div></div>
    <label>DP for this line</label><input id="l-dp" type="date">
    <div class="row" style="margin-top:12px"><button class="a gold grow" id="l-ok">Add line</button>
      <button class="a" onclick="openPO('${poId}')">Back</button></div>`;
  $('#l-ok').onclick = async ()=>{
    if(!$('#l-item').value.trim() || !$('#l-qty').value) return toast('Item and qty required');
    await rpc('po_line_add', { p_po_id:poId, p_item:$('#l-item').value, p_drawing:$('#l-drw').value||null,
      p_uom:$('#l-uom').value||null, p_qty:Number($('#l-qty').value),
      p_rate:$('#l-rate').value?Number($('#l-rate').value):null, p_dp:$('#l-dp').value||null });
    toast('Line added'); openPO(poId);
  };
  $('#dlg').showModal();
}
function addDispatch(lineId, balance){
  $('#dlg').innerHTML = `<div class="t-title">Record dispatch</div>
    <p class="muted" style="margin-top:3px">Balance on this line: <b>${num(balance)}</b>. The database refuses more than the balance.</p>
    <div class="row"><div class="grow"><label>Date</label><input id="d-date" type="date" value="${today()}"></div>
      <div class="grow"><label>Qty</label><input id="d-qty" type="number" step="0.01" max="${balance}"></div></div>
    <label>Reference (invoice / RR / challan)</label><input id="d-ref" placeholder="Optional">
    <div class="row" style="margin-top:12px"><button class="a gold grow" id="d-ok">Save dispatch</button>
      <button class="a" onclick="dlg.close()">Cancel</button></div>`;
  $('#d-ok').onclick = async ()=>{
    const qv = Number($('#d-qty').value); if(!qv) return toast('Qty required');
    await rpc('dispatch_add', { p_line_id:lineId, p_date:$('#d-date').value, p_qty:qv, p_ref:$('#d-ref').value||null });
    toast('Dispatch recorded'); $('#dlg').close(); render[TAB]();
  };
  $('#dlg').showModal();
}
function extendDP(poId, lineId, what){
  $('#dlg').innerHTML = `<div class="t-title">DP extension — ${esc(what)}</div>
    <p class="muted" style="margin-top:3px">Applied but not yet granted? Leave "granted" empty — the DP only moves when the railway grants it.</p>
    <div class="row"><div class="grow"><label>Applied on</label><input id="x-app" type="date" value="${today()}"></div>
      <div class="grow"><label>Granted on</label><input id="x-gr" type="date"></div></div>
    <label>Revised DP</label><input id="x-dp" type="date">
    <label>Remarks (MA no., denial clause, LD…)</label><textarea id="x-rem" rows="2"></textarea>
    <div class="row" style="margin-top:12px"><button class="a gold grow" id="x-ok">Save</button>
      <button class="a" onclick="dlg.close()">Cancel</button></div>`;
  $('#x-ok').onclick = async ()=>{
    await rpc('dp_extend', { p_po_id:poId, p_line_id:lineId, p_applied:$('#x-app').value||null,
      p_granted:$('#x-gr').value||null, p_revised:$('#x-dp').value||null, p_remarks:$('#x-rem').value||null });
    toast($('#x-gr').value ? 'Granted — DP moved' : 'Application logged');
    $('#dlg').close(); render[TAB]();
  };
  $('#dlg').showModal();
}
function invoiceSet(lineId){
  $('#dlg').innerHTML = `<div class="t-title">Invoice / receipt status</div>
    <p class="muted" style="margin-top:3px">This lags the dispatch — a line can be fully dispatched and still unpaid.</p>
    <select id="i-st"><option value="PENDING">Pending</option><option value="INVOICED">Invoiced</option>
      <option value="RECEIVED">Payment received</option></select>
    <div class="row" style="margin-top:12px"><button class="a gold grow" id="i-ok">Save</button>
      <button class="a" onclick="dlg.close()">Cancel</button></div>`;
  $('#i-ok').onclick = async ()=>{
    await rpc('line_invoice_set', { p_line_id:lineId, p_status:$('#i-st').value });
    toast('Saved'); $('#dlg').close(); render[TAB]();
  };
  $('#dlg').showModal();
}
async function closePO(id){
  if(!confirm('Close this PO? Open lines stay on record; the PO leaves the pending lens.')) return;
  await rpc('po_close', { p_po_id:id }); toast('PO closed'); $('#dlg').close(); go('reg');
}

// ---- boot ----
(async ()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(!session){ location.href = './index.html'; return; }
  const {data,error} = await sb.rpc('my_profile');
  if(error || !data?.length){ location.href = './index.html'; return; }
  ME = data[0];
  $('#who').textContent = ME.full_name.split(' ')[0] + ' · ' + ME.role;
  drawNav(); render.pending();
})();
</script>
</body>
</html>
