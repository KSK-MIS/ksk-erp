<!doctype html>
<!-- ============================================================
     KSK ERP 1.0 — Module 1: KARTAVYA (Accountability)
     Tabs: My Tasks · Delegation · Capture · Checklists · Desk · Scoreboard
     Deploys on: GitHub Pages beside index.html. Upload whole, never edit.
     Security lives in Postgres RLS + guarded RPCs, not in this file.
     ============================================================ -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kartavya · KSK ERP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --navy:#0f2440; --navy2:#16345c; --gold:#c9a227; --bg:#f4f6f9; --ok:#1e7e34; --bad:#b02a37; --warn:#a96b00; }
  * { box-sizing:border-box; margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  body { background:var(--bg); min-height:100vh; padding-bottom:70px; }
  header { background:var(--navy); color:#fff; padding:12px 14px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:5; }
  header a { color:var(--gold); text-decoration:none; font-size:20px; }
  header h1 { font-size:16px; flex:1; } header h1 small { display:block; font-weight:400; opacity:.7; font-size:11px; }
  .chip { background:var(--navy2); border:1px solid rgba(255,255,255,.25); border-radius:999px; padding:3px 9px; font-size:11.5px; }
  nav { display:flex; overflow-x:auto; background:#fff; border-bottom:1px solid #e2e7ee; position:sticky; top:53px; z-index:4; }
  nav button { flex:1; min-width:86px; padding:11px 6px; border:0; background:none; font-size:12.5px; font-weight:600; color:#667; border-bottom:3px solid transparent; cursor:pointer; }
  nav button.on { color:var(--navy); border-color:var(--gold); }
  main { max-width:560px; margin:0 auto; padding:12px; }
  .card { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(15,36,64,.08); padding:14px; margin-bottom:10px; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .grow { flex:1; min-width:0; }
  .t-title { font-size:14.5px; font-weight:600; color:#182b45; }
  .t-sub { font-size:12px; color:#778; margin-top:2px; }
  .tag { font-size:10.5px; font-weight:700; border-radius:6px; padding:3px 7px; white-space:nowrap; }
  .tag.late { background:#fdeaea; color:var(--bad); } .tag.ok { background:#e6f4ea; color:var(--ok); }
  .tag.drift { background:#fff3d6; color:var(--warn); } .tag.info { background:#e2ecff; color:#1c4fa0; }
  button.a { border:0; border-radius:8px; padding:8px 11px; font-size:12.5px; font-weight:600; cursor:pointer; background:#e8ecf2; color:var(--navy); }
  button.a.gold { background:var(--gold); color:var(--navy); } button.a.dark { background:var(--navy); color:#fff; }
  input, select, textarea { width:100%; padding:11px; border:1px solid #cfd6e0; border-radius:9px; font-size:14px; margin-top:6px; background:#fff; }
  label { font-size:11.5px; color:#556; display:block; margin-top:8px; }
  h2 { font-size:13.5px; color:var(--navy); margin:14px 2px 8px; }
  .muted { color:#778; font-size:12.5px; }
  .kpi { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; }
  .kpi div { background:#fff; border-radius:10px; padding:10px; text-align:center; box-shadow:0 1px 3px rgba(15,36,64,.07); }
  .kpi b { font-size:20px; color:var(--navy); display:block; } .kpi span { font-size:10.5px; color:#788; }
  .kpi .alert b { color:var(--bad); }
  table { width:100%; border-collapse:collapse; font-size:12.5px; }
  th { text-align:left; color:#788; font-size:10.5px; padding:6px 4px; border-bottom:1px solid #eef; }
  td { padding:8px 4px; border-bottom:1px solid #f2f4f8; }
  #toast { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; padding:10px 18px; border-radius:999px; font-size:13px; display:none; z-index:20; }
  dialog { border:0; border-radius:14px; padding:18px; width:min(92vw,420px); }
  dialog::backdrop { background:rgba(15,36,64,.5); }
</style>
</head>
<body>
<header>
  <a href="./index.html">←</a>
  <h1>Kartavya <small>Accountability · KSK ERP 1.0</small></h1>
  <div class="chip" id="who"></div>
</header>
<nav id="nav"></nav>
<main id="main"><p class="muted" style="padding:30px;text-align:center">Loading…</p></main>
<div id="toast"></div>
<dialog id="dlg"></dialog>

<script>
const sb = supabase.createClient("https://xpacvqbmpvcwhcimieaq.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwYWN2cWJtcHZjd2hjaW1pZWFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NTczNzEsImV4cCI6MjA5OTMzMzM3MX0.88Q1E70WK8kO6osdre4a9yHmTPdAuRYau_ihxD5fl0c"); // public by design; RLS is the guard
const $ = s => document.querySelector(s);
let ME = null, USERS = [], TAB = 'my';
const esc = t => (t??'').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt = d => d ? new Date(d+'T00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short'}) : '';
const today = () => new Date().toISOString().slice(0,10);
function toast(m){ const t=$('#toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); }
async function rpc(fn, args){ const {data,error} = await sb.rpc(fn,args); if(error){ toast(error.message); throw error; } return data; }
async function q(view, mod){ let x = sb.from(view).select('*'); if(mod) x = mod(x); const {data,error} = await x; if(error){ toast(error.message); return []; } return data; }

const TABS = [['my','My Tasks'],['del','Delegation'],['cap','Capture'],['chk','Checklists'],['desk','Desk'],['score','Scoreboard']];
function drawNav(){
  const t = (ME.role==='DIRECTOR'||ME.role==='ADMIN') ? TABS : TABS.filter(x=>x[0]!=='desk');
  $('#nav').innerHTML = t.map(([id,l])=>`<button class="${TAB===id?'on':''}" onclick="go('${id}')">${l}</button>`).join('');
}
function go(t){ TAB=t; drawNav(); render[t](); }

function taskCard(t, mine){
  const od = t.status==='OPEN' && t.due_current < today();
  const drift = t.revision_count>0;
  return `<div class="card"><div class="row">
    <div class="grow"><div class="t-title">${esc(t.title)}</div>
      <div class="t-sub">${t.task_no} · ${mine?'from '+esc(t.assigned_by_name):'→ '+esc(t.assignee_name)} · due ${fmt(t.due_current)}
      ${t.detail?'<br>'+esc(t.detail):''}</div></div>
    ${od?'<span class="tag late">OVERDUE</span>':''}
    ${drift?`<span class="tag drift" onclick="history_('${t.id}')">${t.revision_count} rev ⓘ</span>`:''}
    ${t.status!=='OPEN'?`<span class="tag ${t.status==='DONE'?'ok':'info'}">${t.status}</span>`:''}
    </div>
    ${t.status==='OPEN'?`<div class="row" style="margin-top:9px">
      ${mine?`<button class="a gold" onclick="done('${t.id}')">✓ Done</button>`:''}
      <button class="a" onclick="progress('${t.id}')">✔→ Progress</button>
      <button class="a" onclick="revise('${t.id}')">⟳ Move date</button>
      ${!mine?`<button class="a" onclick="cancel('${t.id}')">✕</button>`:''}
    </div>`:''}</div>`;
}
function markCard(m, mine){
  const late = ['overdue'].includes(m.status), pend = ['pending','overdue'].includes(m.status);
  return `<div class="card row">
    <div class="grow"><div class="t-title">${esc(m.title)}</div>
      <div class="t-sub">${mine?'':esc(m.assignee_name)+' · '}${{D:'Daily',W:'Weekly',M:'Monthly',Q:'Quarterly'}[m.frequency]} · due ${fmt(m.due_date)} · ${m.on_miss}</div></div>
    ${late?`<span class="tag late">OVERDUE ×${m.overdue_count}</span>`:''}
    ${m.status==='missed'?'<span class="tag late">MISSED</span>':''}
    ${['done','done_late'].includes(m.status)?`<span class="tag ok">${m.status.toUpperCase()}</span>`:''}
    ${pend&&mine?`<button class="a gold" onclick="mark('${m.id}')">✓</button>`:''}</div>`;
}

const render = {
  async my(){
    const [ts, ms] = await Promise.all([
      q('v_tasks', x=>x.eq('assignee_email', ME.email).eq('status','OPEN').order('due_current')),
      q('v_checklist_marks', x=>x.eq('assignee_email', ME.email).in('status',['pending','overdue']).lte('due_date', today()).order('due_date'))
    ]);
    $('#main').innerHTML = `<h2>My checklist — today</h2>` +
      (ms.map(m=>markCard(m,true)).join('')||'<p class="muted">Nothing due. ✓</p>') +
      `<h2>My open tasks (${ts.length})</h2>` + (ts.map(t=>taskCard(t,true)).join('')||'<p class="muted">No open tasks.</p>');
  },
  async del(){
    const all = (ME.role!=='STAFF');
    const ts = await q('v_tasks', x=>{ let y = x.order('status').order('due_current');
      return all ? y : y.eq('assigned_by_email', ME.email); });
    $('#main').innerHTML = `<div class="card">
      <div class="t-title">New task</div>
      <input id="nt-title" placeholder="What must be done?">
      <textarea id="nt-detail" rows="2" placeholder="Details (optional)"></textarea>
      <div class="row"><div class="grow"><label>Assign to</label><select id="nt-who">${USERS.map(u=>`<option value="${u.email}">${esc(u.full_name)}</option>`).join('')}</select></div>
      <div class="grow"><label>Due</label><input id="nt-due" type="date" value="${today()}"></div></div>
      <button class="a dark" style="width:100%;margin-top:10px" onclick="createTask()">Assign task</button></div>
      <h2>Register (${ts.length}) — drift is visible, never punished</h2>` +
      (ts.map(t=>taskCard(t, t.assignee_email===ME.email)).join('')||'<p class="muted">Empty.</p>');
  },
  async cap(){
    const cs = await q('v_capture', x=>x.in('status',['INBOX','SOMEDAY']).order('created_at',{ascending:false}));
    $('#main').innerHTML = `<div class="card"><div class="t-title">Capture — private. Provably. 🔒</div>
      <textarea id="cp" rows="2" placeholder="Anything on your mind…"></textarea>
      <button class="a gold" style="width:100%;margin-top:8px" onclick="capAdd()">+ Capture</button></div>` +
      cs.map(c=>`<div class="card"><div class="t-sub" style="font-size:13.5px;color:#233">${esc(c.content)}</div>
        <div class="row" style="margin-top:8px">
        <button class="a" onclick="capTask('${c.id}')">→ Task</button>
        ${c.status!=='SOMEDAY'?`<button class="a" onclick="capSet('${c.id}','SOMEDAY')">Someday</button>`:''}
        <button class="a" onclick="capSet('${c.id}','DROPPED')">Drop</button>
        ${c.status==='SOMEDAY'?'<span class="tag info">SOMEDAY</span>':''}</div></div>`).join('') || '';
  },
  async chk(){
    const admin = ME.role!=='STAFF';
    const ms = await q('v_checklist_marks', x=>x.order('due_date',{ascending:false}).limit(60));
    let form = '';
    if(admin) form = `<div class="card"><div class="t-title">New recurring duty</div>
      <input id="ck-title" placeholder="Duty (e.g. Daily production report)">
      <div class="row"><div class="grow"><label>Assignee</label><select id="ck-who">${USERS.map(u=>`<option value="${u.email}">${esc(u.full_name)}</option>`).join('')}</select></div>
      <div class="grow"><label>Frequency</label><select id="ck-freq"><option value="D">Daily</option><option value="W">Weekly</option><option value="M">Monthly</option><option value="Q">Quarterly</option></select></div></div>
      <label>If missed: <b>lapse</b> = record &amp; move on · <b>carry</b> = stays owed</label>
      <select id="ck-miss"><option value="lapse">lapse</option><option value="carry">carry</option></select>
      <button class="a dark" style="width:100%;margin-top:10px" onclick="ckCreate()">Create</button></div>`;
    $('#main').innerHTML = form + `<h2>Occurrences</h2>` +
      (ms.map(m=>markCard(m, m.assignee_email===ME.email)).join('')||'<p class="muted">No checklists yet.</p>');
  },
  async desk(){
    const [ts, ms] = await Promise.all([
      q('v_tasks', x=>x.eq('status','OPEN').order('due_current')),
      q('v_checklist_marks', x=>x.in('status',['overdue','missed']).order('due_date',{ascending:false}).limit(30))
    ]);
    const od = ts.filter(t=>t.due_current<today()), dr = ts.filter(t=>t.revision_count>0);
    $('#main').innerHTML = `<div class="kpi">
      <div class="${od.length?'alert':''}"><b>${od.length}</b><span>tasks overdue</span></div>
      <div class="${dr.length?'alert':''}"><b>${dr.length}</b><span>drifting (revised)</span></div>
      <div class="${ms.length?'alert':''}"><b>${ms.length}</b><span>checklist lapses</span></div></div>
      <h2>Overdue first — exceptions outrank totals</h2>` +
      (od.map(t=>taskCard(t,false)).join('')||'<p class="muted">Nothing overdue. ✓</p>') +
      `<h2>Drifting</h2>` + (dr.filter(t=>!od.includes(t)).map(t=>taskCard(t,false)).join('')||'<p class="muted">No drift.</p>') +
      `<h2>Checklist exceptions</h2>` + (ms.map(m=>markCard(m,false)).join('')||'<p class="muted">All clear.</p>');
  },
  async score(){
    const m = today().slice(0,8)+'01';
    const rows = await q('v_scoreboard', x=>x.eq('month', m).order('overall',{ascending:false}));
    $('#main').innerHTML = `<div class="card"><div class="t-title">Scoreboard — ${new Date().toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</div>
      <p class="muted" style="margin-top:4px">Overall = 70% tasks + 30% checklists. On-time = 1, late = ½. Revisions shown, never deducted.</p>
      <table><tr><th>Person</th><th>Tasks</th><th>Checklist</th><th>Overall</th><th>Rev</th></tr>
      ${rows.map(r=>`<tr><td>${esc(r.full_name)}</td><td>${r.task_score??'—'} <span class="muted">/${r.tasks_due}</span></td>
        <td>${r.checklist_score??'—'} <span class="muted">/${r.checklist_due}</span></td>
        <td><b>${r.overall}</b></td><td>${r.revisions}</td></tr>`).join('') || '<tr><td colspan=5 class="muted">No activity this month yet.</td></tr>'}
      </table></div>`;
  }
};

// ---- actions (every write goes through a guarded RPC) ----
async function createTask(){ const t=$('#nt-title').value; if(!t.trim())return toast('Title required');
  const n = await rpc('task_create',{p_title:t,p_detail:$('#nt-detail').value||null,p_assignee_email:$('#nt-who').value,p_due:$('#nt-due').value});
  toast('Created '+n); render.del(); }
async function done(id){ await rpc('task_done',{p_task_id:id}); toast('Done ✓'); render[TAB](); }
async function progress(id){ ask('Progress note (deadline untouched):','e.g. Step 1 complete, vendor call Monday', async v=>{ await rpc('task_progress',{p_task_id:id,p_note:v}); toast('Noted'); }); }
async function revise(id){ ask('New date + reason (recorded forever):','Reason for moving the deadline…', async (v,d)=>{ await rpc('task_revise',{p_task_id:id,p_new_due:d,p_reason:v}); toast('Date moved — reason logged'); render[TAB](); }, true); }
async function cancel(id){ ask('Reason for cancelling:','', async v=>{ await rpc('task_cancel',{p_task_id:id,p_reason:v}); toast('Cancelled (archived)'); render[TAB](); }); }
async function capAdd(){ const v=$('#cp').value; if(!v.trim())return; await rpc('capture_add',{p_content:v}); render.cap(); }
async function capSet(id,s){ await rpc('capture_set',{p_id:id,p_status:s}); render.cap(); }
async function capTask(id){ ask('Assign to (email) — or leave as yours:', ME.email, async (v,d)=>{ const n=await rpc('capture_to_task',{p_id:id,p_assignee_email:v||ME.email,p_due:d}); toast('Created '+n); render.cap(); }, true); }
async function ckCreate(){ const t=$('#ck-title').value; if(!t.trim())return toast('Title required');
  await rpc('checklist_create',{p_title:t,p_assignee_email:$('#ck-who').value,p_freq:$('#ck-freq').value,p_on_miss:$('#ck-miss').value});
  await rpc('kart_sweep_now',{}).catch(()=>{}); toast('Created'); render.chk(); }
async function mark(id){ await rpc('checklist_mark',{p_mark_id:id}); toast('Marked ✓'); render[TAB](); }
async function history_(id){ const rs = await q('v_task_revisions', x=>x.eq('task_id',id).order('changed_at'));
  $('#dlg').innerHTML = `<div class="t-title">Deadline history</div>` +
    rs.map(r=>`<p class="t-sub" style="margin-top:8px"><b>${fmt(r.old_due)} → ${fmt(r.new_due)}</b> · ${esc(r.changed_by_name)}<br>${esc(r.reason)}</p>`).join('') +
    `<button class="a" style="margin-top:12px" onclick="dlg.close()">Close</button>`;
  $('#dlg').showModal(); }
function ask(title, ph, cb, withDate){
  $('#dlg').innerHTML = `<div class="t-title">${title}</div>
    <textarea id="dlg-v" rows="2" placeholder="${esc(ph)}">${withDate&&ph.includes('@')?esc(ph):''}</textarea>
    ${withDate?`<label>Date</label><input id="dlg-d" type="date" value="${today()}">`:''}
    <div class="row" style="margin-top:12px"><button class="a gold grow" id="dlg-ok">OK</button>
    <button class="a" onclick="dlg.close()">Cancel</button></div>`;
  $('#dlg-ok').onclick = async ()=>{ await cb($('#dlg-v').value, withDate?$('#dlg-d').value:null); $('#dlg').close(); };
  $('#dlg').showModal();
}

// ---- boot ----
(async ()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(!session){ location.href = './index.html'; return; }
  const {data,error} = await sb.rpc('my_profile');
  if(error || !data?.length){ location.href = './index.html'; return; }
  ME = data[0];
  $('#who').textContent = ME.full_name.split(' ')[0] + ' · ' + ME.role;
  USERS = await q('v_users', x=>x.order('full_name'));
  drawNav(); render.my();
})();
</script>
</body>
</html>
